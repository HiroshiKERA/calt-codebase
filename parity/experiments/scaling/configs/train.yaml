model:
  model_type: generic
  num_encoder_layers: 4
  num_encoder_heads: 8
  num_decoder_layers: 4
  num_decoder_heads: 8
  d_model: 256
  encoder_ffn_dim: 1024
  decoder_ffn_dim: 1024
  max_sequence_length: 128

train:
  save_dir: ../outputs/results
  num_train_epochs: 200
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_ratio: 0.1
  batch_size: 256
  test_batch_size: 256
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  optimizer: adamw_torch
  num_workers: 4
  seed: 42
  wandb:
    project: calt-experiments
    group: parity
    name: scaling_n7
    no_wandb: false

data:
  train_dataset_path: ../data/train_raw.txt
  test_dataset_path: ../data/test_raw.txt
  lexer_config: ../../toy/configs/lexer.yaml
  validate_train_tokens: false
  validate_test_tokens: false
