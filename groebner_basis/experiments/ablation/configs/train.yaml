model:
  model_type: generic
  num_encoder_layers: 6
  num_encoder_heads: 8
  num_decoder_layers: 6
  num_decoder_heads: 8
  d_model: 512
  encoder_ffn_dim: 2048
  decoder_ffn_dim: 2048
  max_sequence_length: 2048

train:
  save_dir: ../outputs/results
  num_train_epochs: 100
  learning_rate: 0.0003
  weight_decay: 0.0
  warmup_ratio: 0.05
  batch_size: 32
  test_batch_size: 32
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  optimizer: adamw_torch
  num_workers: 4
  seed: 42
  wandb:
    project: calt-experiments
    group: groebner_basis_ablation
    name: ablation_placeholder
    no_wandb: false

data:
  train_dataset_path: ../../toy/data/QQ/train_raw.txt
  test_dataset_path: ../../toy/data/QQ/test_raw.txt
  lexer_config: ../../toy/configs/lexer.yaml
  validate_train_tokens: false
  validate_test_tokens: false
