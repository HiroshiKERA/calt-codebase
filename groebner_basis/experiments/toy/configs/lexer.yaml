vocab:
  range:
    numbers: ["", -100, 100]
  misc: ["+", "-", "*", "^", "x", "y", "|", "/"]
  special_tokens: {}
  flags:
    include_base_vocab: true
    include_base_special_tokens: true

number_policy:
  attach_sign: true
  digit_group: 1        # tokenize each digit separately → handles any coefficient size
  allow_float: false

strict: true
include_base_vocab: true
