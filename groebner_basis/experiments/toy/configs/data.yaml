# Groebner task (toy): F=[f1,f2] over QQ[x,y] -> degrevlex Gröbner basis G of (F)

# PolynomialSampler parameters (consumed by GroebnerGenerator)
sampler:
  symbols: "x,y"
  field_str: "QQ"
  order: "degrevlex"
  max_num_terms: 5
  max_degree: 4
  min_degree: 1
  max_coeff: 5
  degree_sampling: "uniform"
  term_sampling: "uniform"

# GroebnerGenerator-specific parameters
problem_generator:
  num_polynomials: 2

# DatasetPipeline parameters
dataset:
  save_dir: "../data/QQ"
  num_train_samples: 1000
  num_test_samples: 200
  batch_size: 100
  n_jobs: 4
  root_seed: 42
  verbose: true
  backend: "sagemath"
  save_text: true
  save_json: false
