# Border basis finite_field: generate.py overrides field_str via --p flag.

sampler:
  symbols: "x,y"
  field_str: "GF7"        # overridden by generate.py --p
  order: "degrevlex"
  max_num_terms: 4
  max_degree: 3
  min_degree: 1
  max_coeff: 0
  degree_sampling: "uniform"
  term_sampling: "uniform"

problem_generator:
  num_polynomials: 3

dataset:
  save_dir: "../data/GF7" # overridden by generate.py --p
  num_train_samples: 5000
  num_test_samples: 500
  batch_size: 500
  n_jobs: 8
  root_seed: 42
  verbose: true
  backend: "sagemath"
  save_text: true
  save_json: false
